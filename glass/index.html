<html>
<head>
    <title>Glass</title>
</head>
<body>

    <div class="background">
  <div class="glass-form">
    <h2>Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Submit</button>
  </div>
</div>

<style>
  /* Background e kichu color thaka dorkar jeno glass effect bojha jay */
  body {
    background: url(images.jpg);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-repeat: no-repeat;
    background-size: cover;
  }

  .glass-form {
    /* Glass Effect er main part */
    background: rgba(255, 255, 255, 0.1); /* Shada color kintu transparent */
    backdrop-filter: blur(10px); /* Background ta jhalsa/blur korbe */
    -webkit-backdrop-filter: blur(10px); /* Safari support er jonno */
    
    border: 1px solid rgba(255, 255, 255, 0.3); /* Border e halka shada highlight */
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); /* Halka shadow */
    width: 300px;
    text-align: center;
  }

  input {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background: rgba(255, 255, 255, 0.2);
    border: none;
    border-radius: 5px;
    color: #000;
  }

  button {
    background: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
  }
</style>

</body>

</html>
