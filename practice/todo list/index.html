<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todo - list</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0423;
        }
        .todo-container{
            width: 500px;
            height: 400px;
            padding: 20px 60px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0px 4px rgba(255, 255, 255, 0.5);
        }
        .todo-container h1{
            font-size: 45px;
            text-transform: uppercase;
            text-align: center;
            color: #fff;
        }
        .todo-search-box{
            position: relative;
        }
        #search{
            width: 100%;
            height: 35px;
            border-radius: 25px;
            padding: 5px 20px;
            box-shadow: 0 0px 4px rgba(255, 255, 255, 0.5);
            border: none;
            outline: none;
        }
        #addBtn{
            position: absolute;
            right: 0;
            width: 100px;
            height: 35px;
            border-radius: 25px;
            border: none;
            outline: none;
            background-color: aqua;
            text-transform: uppercase;
            font-weight: 700;
        }
        .todo-list ul li{
            list-style: none;
            text-transform: capitalize;
            font-size: 20px;
            color: #fff;
            margin-bottom: 8px;
            margin-top: 8px;
            cursor: pointer;
            position: relative;
            padding-left: 35px;
        }
        .todo-list ul li::before{
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            border: 2px solid #ccc;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        .todo-list ul li.checked{
            text-decoration: line-through;
            color: #555;
            position: relative;
        }
        .todo-list ul li.checked::before{
            position: absolute;
            content: "✔️";
            font-size: 15px;
            color: #555;
            transform: translateY(-50%, -0%);
            top: 50%;
            left: 0%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
span.close {
    position: absolute;
    right: 0;
    font-size: 12px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    top: 0;
}
span.close:hover{
    background: #ccc;
}
#todoList{
    position: relative;
}
    </style>
</head>
<body>
    <div class="todo-container">
        <h1>todo - list</h1>

        <div class="todo-items">
            <div class="todo-search-box">
                <input type="text" name="search" autocomplete="off" id="search" placeholder="Add a Task">
                <button id="addBtn">add</button>
            </div>

            <div class="todo-list">
                <ul id="todoList">
                    <!-- <li class="checked">
                        task 1
                    </li>
                    <li>
                        task 2
                    </li>
                    <li>
                        task 3
                    </li>
                    <li>
                        task 4
                    </li> -->
                </ul>
            </div>

            <div class="complete-list">
                
            </div>
        </div>

    </div>

    <script>
        const serachBox = document.getElementById('search');
        const addBtn  = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');


        addBtn.addEventListener('click', function(e){
            e.preventDefault();
            if(serachBox.value === ''){
                alert('please add a task');
            }else{
                const li = document.createElement('li');
                li.innerHTML = serachBox.value;
                todoList.appendChild(li);

                const span = document.createElement('span');
                span.classList.add('close');
                span.innerHTML = '❌';
                li.appendChild(span);
            }
            serachBox.value = '';
            saveTask();
        });

        todoList.addEventListener('click', function(e){
            if(e.target.tagName === 'LI'){
                e.target.classList.toggle('checked');
                saveTask();
            }else if(e.target.tagName === 'SPAN'){
                e.target.parentElement.remove();
                saveTask();
            }
        }, false);

        function saveTask(){
            localStorage.setItem('data', todoList.innerHTML);
        }

        function saveTodo(){
            todoList.innerHTML = localStorage.getItem('data');
        }

        saveTodo();


    </script>
</body>
</html>
