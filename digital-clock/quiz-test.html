<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quiz timer with button</title>
    <style>
        .timer{
            display: flex;
            gap: 10px;
            display: none;
        }
        .quizTimer{
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .quizTimer.disabled{
            background-color: #ccc;
            cursor: not-allowed;
        }
        .d-block{
            display: inline-flex !important;
        }
    </style>
</head>
<body>

    <div class="timer">
        <div id="minutes">00</div>
            <span>:</span>
        <div id="seconds">20</div>
    </div>

    <div class="quiz">
        <button class="quizTimer">
            one
        </button>
        <button class="quizTimer">
            two
        </button>
        <button class="quizTimer">
            three
        </button>
        <button class="quizTimer">
            four
        </button>
    </div>

    <script>
        let timerLeft = 20;

        const minutes = document.getElementById('minutes');
        const seconds = document.getElementById('seconds');

        const quizTimer = document.querySelectorAll('.quizTimer');
        const time = document.querySelector('.timer');

        quizTimer.forEach(timerBox => {
            timerBox.addEventListener('click', function(){
                time.classList.add('d-block');
            });
        })
        
        function startTimer(){
            const setTimer = setInterval(function(){
            let minute = Math.floor(timerLeft / 60);
            let second = (timerLeft % 60);

            let minuteEl = (minute < 10) ? "0" + minute : minute;
            let secondEl = (second < 10) ? "0" + second : second;

            minutes.innerText = minuteEl;
            seconds.innerText = secondEl;

            if(timerLeft <= 0){
                clearInterval(setTimer);
                alert("Time's Up! Your quiz is being submitted.");
                minutes.innerText = "00";
                seconds.innerText = "00";
            }

            timerLeft--;
        }, 1000);
        }


        quizTimer.forEach(timer => {
            timer.addEventListener('click', startTimer);
            if(timerLeft <= 0){
                this.classList.add('disabled');
            }
        })
    </script>
    
</body>
</html>
