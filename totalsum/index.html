<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>final</title>
    <style>

#checkbox{
    opacity: 0;
    width: 0;
    height: 0;
}
#box{
    position: relative;
}
#check {
    position: absolute;
    right: 16px;
    top: 0;
}

    </style>
</head>
<body>

    <input type="range" name="input" id="input" min="20" max="100" value="20">

    <div id="output">
        <input type="hidden" name="output" id="sum">
        <div id="result">
            Total : 20 $
        </div>
    </div>

    <br><br>

    <div class="extra-container">
        <div class="extra">
            <label>
                <input type="checkbox" name="extra" id="extraItem" class="extra-item" value="15">
                fast delivery (+$15)
            </label>
            <label>
                <input type="checkbox" name="extra" id="extraItem" class="extra-item" value="30">
                fast working (+$30)
            </label>
            <label>
                <input type="checkbox" name="extra" id="extraItem" class="extra-item" value="30">
                 support (+$25)
            </label>
        </div>
    </div>

    <br><br>

    <input type="password" name="password" id="password" placeholder="enter password">
    <label id="box">
        <input type="checkbox" name="checkbox" id="checkbox" value="show">
        <div id="check">
            Show
        </div>
    </label>

    <br><br>

    <input type="submit" value="send" id="submit">

    <br><br><br><br>

    <div class="todo">
        <div class="inputBox">
            <input type="text" name="text" id="todoItem">
            <button id="add" onclick="todo()">add</button>
        </div>

        <div id="list">
            <ul id="listContainer">
                <!-- <li>buy a book</li>
                <li>buy a book</li>
                <li>buy a book</li> -->
            </ul>
        </div>
    </div>
    

    <script>

        const inputItem = document.getElementById('todoItem');
        const addSub = document.getElementById('add');
        const listContainer = document.getElementById('listContainer');

        function todo(){
            if(inputItem.value === ''){
                alert('enter a task');
            }else{
                listContainer.innerHTML += `<li>${inputItem.value}</li>`;
                inputItem.value = '';
            }
            todoSave();
        };

        function todoSave(){
            localStorage.setItem('data', listContainer.innerHTML);
        }

        function saveBrowser(){
            listContainer.innerHTML = localStorage.getItem('data');
        }
        saveBrowser();








        const password = document.getElementById('password');
        const checkbox = document.getElementById('checkbox');
        const check = document.getElementById('check');
        const submit = document.getElementById('submit');
        const extraItems = document.querySelectorAll('.extra-item');
        const slider = document.getElementById('input');
        const hiddenValue = document.getElementById('sum');
        const result = document.getElementById('result');

        function updateSum(){
            const val = parseInt(slider.value);
            let sum = 0;

            extraItems.forEach(item=>{
                if(item.checked){
                    sum += parseInt(item.value);
                }
            });
            const finalSum = val + sum;
            hiddenValue.value = finalSum;

            result.innerHTML = `Total : ${finalSum} $`;

        }
        slider.addEventListener('input', updateSum);

        extraItems.forEach(checkBox=>{
            checkBox.addEventListener('change', updateSum);
        })


        checkbox.addEventListener('click', function(){
            if(checkbox.checked){
                password.type = 'text';
                check.innerText = 'Hide';
            }else{
                password.type = 'password';
                check.innerText = 'Show';
            }
        });

        submit.addEventListener('click', function(){
            if(password.value === ''){
                alert('enter a password')
            }
        });
        


    </script>
</body>
</html>
