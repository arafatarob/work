<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scroll height</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .scroll_container{
            background: linear-gradient(to bottom,#44c0e5 0%,#35add1 39%,#0d85a8 100%) !important;
            box-shadow: 0 0 7px rgba(0, 0, 0, 0.5);
            width: 100%;
            height: 30px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .indicator{
            width: 0%;
            height: 8px;
            background: linear-gradient(#ff6666, #cc0000) !important;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }
        .scroll_content{
            padding: 0 40px;
            text-transform: capitalize;
            font-size: 18px;
            margin-top: 30%;
            position: sticky;
            top: 50px;
        }
        body{
            min-height: 3000px;
        }
    </style>
</head>
<body>

    <div class="scroll_container">
        <div class="indicator"></div>
    </div>

    <div class="scroll_content">
        go down 👇👇
    </div>
    
    <script>
        window.onscroll = () =>{
            updateScroll();
        }

        function updateScroll(){
            const winScroll = document.documentElement.scrollTop || window.pageYOffset;
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;

            const scrolled = (winScroll / scrollHeight) * 100;

            document.querySelector('.indicator').style.width = scrolled + "%";
        }
    </script>
</body>
</html>
