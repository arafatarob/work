<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>menu bar</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background: #e91e63;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .menu{
            background: rgba(255, 255, 255, 0.2);
            width: 100px;
            height: 100px;
            backdrop-filter: blur(10px);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .menu span{
            width: 30px;
            height: 2px;
            background: #ccc;
            display: inline-block;
            cursor: pointer;
            transition: 0.4s ease-in-out;
            /* display: block;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            margin: 0 auto;
            margin-top: 10px;
            transition: all 0.3s ease-in-out; */

            /* animation: bounce 0.8s ease-in-out infinite; */
        }

        /* @keyframes bounce{
            0%{
                transform: translateY(0);
            }
            50%{
                transform: translateY(-10px);
            }
            100%{
                transform: translateY(0);
            }
        }

        .menu span:nth-child(1){
            animation-delay: 0.4s;
        }
        .menu span:nth-child(2){
            animation-delay: 0.6s;
        }
        .menu span:nth-child(3){
            animation-delay: 0.8s;
        } */

        .menu span.deactive{
            display: none !important;
        }
span.rotateOne {
    transform: rotate(45deg);
    position: absolute;
}
span.rotateThree {
    transform: rotate(-45deg);
    position: absolute;
}

.right_menu {
    background-color: rgba(255, 255, 255, 0.2);
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(30px);
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.5);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 10px;
    padding: 20px 10px;
    position: absolute;
    top: 50%; /* Center korar jonno */
    transform: translateY(-50%);
    left: -200px; /* Purapuri baire rakhar jonno */
    transition: all 0.5s cubic-bezier(0.5, -1, 0.666, 2);
    z-index: 100;
}

.right_menu.left {
    left: 20px; /* Menu open hole position */
}

.right_menu span {
    color: #fff;
    font-family: sans-serif;
    font-size: 16px;
    line-height: 35px;
    text-transform: uppercase;
    opacity: 0; /* Shuru te invisible thakbe */
    transform: translateX(-20px);
    transition: all 0.4s ease-in-out;
}

/* Menu jokhon 'left' class pabe, tokhon span gulo animate hobe */
.right_menu.left span {
    opacity: 1;
    transform: translateX(0);
}

/* Animation Delay thik kora hoyeche */
.right_menu.left span:nth-child(1) { transition-delay: 0.1s; }
.right_menu.left span:nth-child(2) { transition-delay: 0.2s; }
.right_menu.left span:nth-child(3) { transition-delay: 0.3s; }
.right_menu.left span:nth-child(4) { transition-delay: 0.4s; }
.right_menu.left span:nth-child(5) { transition-delay: 0.5s; }
.right_menu.left span:nth-child(6) { transition-delay: 0.6s; }




</style>

</head>
<body>

    <div class="menu">
        <span class="one"></span>
        <span class="two"></span>
        <span class="three"></span>
    </div>

    <div class="right_menu">
        <span>Home</span>
        <span>About</span>
        <span>Contact</span>
        <span>Services</span>
        <span>Blog</span>
        <span>Portfolio</span>
    </div>


    <script>
        const menu = document.querySelector('.menu');
        const one = document.querySelector('.one');
        const two = document.querySelector('.two');
        const three = document.querySelector('.three');
        const rightMenu = document.querySelector('.right_menu');
        let isActive = false;
        
        menu.addEventListener('click', function(){
            isActive = !isActive;

            two.classList.toggle('deactive');
            one.classList.toggle('rotateOne');
            three.classList.toggle('rotateThree');

            rightMenu.classList.toggle('left');

        });
        

    </script>
