<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider Test</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <div class="slider_wrapper">
            <img id="left_arrow" src="./img/left_arrow.png" alt="">
            <div class="slider">
                <div><img src="./img/img-1.jpg" alt=""></div>
                <div><img src="./img/img-2.jpg" alt=""></div>
                <div><img src="./img/img-3.jpg" alt=""></div>
                <div><img src="./img/img-4.jpg" alt=""></div>
                <div><img src="./img/img-5.jpg" alt=""></div>
                <div><img src="./img/img-1.jpg" alt=""></div>
            </div>
            <img id="right_arrow" src="./img/right_arrow.png" alt="">
        </div>

        <div class="dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

    </div>

    <script>
        const sliderContainer = document.querySelector('.slider');
        const leftArrow = document.getElementById('left_arrow');
        const rightArrow = document.getElementById('right_arrow');
        const dots = document.querySelectorAll('.dot');
        const imageWidth = 910;

        sliderContainer.addEventListener('wheel', function(s){
            s.preventDefault();
            if(s.deltaY > 0){
                sliderContainer.scrollLeft += imageWidth;
            }else{
                sliderContainer.scrollLeft -= imageWidth;
            }
        });

        leftArrow.addEventListener('click', ()=>{
            sliderContainer.scrollLeft -= imageWidth;
        })

        rightArrow.addEventListener('click', ()=>{
            sliderContainer.scrollLeft += imageWidth;
        })

        function updateDots(){
            const activeIndex = Math.round(sliderContainer.scrollLeft / imageWidth);

            dots.forEach((dot, index)=>{
                if(activeIndex === index){
                    dot.classList.add('active');
                }else{
                    dot.classList.remove('active');
                }
            })
        }

        sliderContainer.addEventListener('scroll', updateDots);

        dots.forEach((dot, index)=>{
            dot.addEventListener('click', function(){
                sliderContainer.scrollLeft = imageWidth * index;
            })
        });
        
        const sliderTime = setInterval(()=>{
            if(sliderContainer.scrollLeft + sliderContainer.offsetWidth >= sliderContainer.scrollWidth){
                sliderContainer.scrollLeft = 0;
            }else{
                sliderContainer.scrollLeft += imageWidth;
            }
        }, 3000);

        // clearInterval(sliderTime);

    </script>
    
</body>
</html>
