<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAG & DROP</title>
    <style>
        body{
            background: #0b0423;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            display: flex;
            gap: 20px;
        }
        #left, #right{
            width: 250px;
            height: 410px;
            border: 2px dashed #fff;
            border-radius: 4px;
            padding: 20px;
        }
        .list{
            height: 50px;
            background-color: #e91e63;
            color: #fff;
            display: flex;
            justify-content: start;
            align-items: center;
            padding: 0 20px;
            font-size: 20px;
            text-transform: capitalize;
            margin-bottom: 10px;
            cursor: grab;
            border-radius: 6px;
        }
        .list img{
            width: 40px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="left">
            <div class="list" draggable="true">
                <img src="icon.png" alt=""> list item 1
            </div>
            <div class="list" draggable="true">
                <img src="icon.png" alt=""> list item 2
            </div>
            <div class="list" draggable="true">
                <img src="icon.png" alt=""> list item 3
            </div>
            <div class="list" draggable="true">
                <img src="icon.png" alt=""> list item 4
            </div>
            <div class="list" draggable="true">
                <img src="icon.png" alt=""> list item 5
            </div>
            <div class="list" draggable="true">
                <img src="icon.png" alt=""> list item 6
            </div>
            <div class="list" draggable="true">
                <img src="icon.png" alt=""> list item 7
            </div>
            
        </div>
        <div id="right"></div>
    </div>


    <script>
        const lists = document.getElementsByClassName('list');
        const leftBox = document.getElementById('left');
        const rightBox = document.getElementById('right');

        for(list of lists){
            list.addEventListener('dragstart', function(e){
                let selected = e.target;

                rightBox.addEventListener('dragover', function(e){
                    e.preventDefault();
                });
                rightBox.addEventListener('drop', function(e){
                    rightBox.appendChild(selected);
                    selected = null;
                });
                leftBox.addEventListener('dragover', function(e){
                    e.preventDefault();
                });
                leftBox.addEventListener('drop', function(e){
                    leftBox.appendChild(selected);
                    selected = null;
                });
            });
        }


    </script>
    
</body>
</html>
