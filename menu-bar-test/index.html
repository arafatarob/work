<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>menu bar test</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #0b0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .menubar{
            width: 100px;
            height: 100px;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .menubar span{
            width: 40px;
            height: 3px;
            background: #000;
            display: inline-flex;
            transition: all 0.3s ease-in-out;
        }
        .menu {
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: inset 10px 10px 10px rgba(0, 0, 0, 0.7), 
                        inset  -10px -10px 10px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 6px;
            padding: 20px 20px;
            transition: all 0.6s cubic-bezier(0.755, -1, 0.666, 2);
            position: absolute;
            left: -200px;
            top: 300px;
            z-index: 999;
        }
        .menu.leftMenu{
            left: 10px;
        }
        .menu span{
            font-size: 18px;
            color: #000;
            cursor: pointer;
            text-transform: uppercase;
            line-height: 35px;
            transition: all 0.3s ease-in-out;
            transform: translateX(-40px);
            opacity: 0;
        }

        .menu.leftMenu span{
            transform: translateX(0);
            opacity: 1;
        }

        .menu.left span:nth-child(1){
            transition-delay: 0.3s;
        }
        .menu.left span:nth-child(2){
            transition-delay: 0.6s;
        }
        .menu.left span:nth-child(3){
            transition-delay: 0.9s;
        }
        .menu.left span:nth-child(4){
            transition-delay: 0.12s;
        }
        .menu.left span:nth-child(5){
            transition-delay: 0.15s;
        }
        .menu.left span:nth-child(6){
            transition-delay: 0.18s;
        }

        .deactive{
            display: none !important;
        }
        .plusRotate {
    transform: rotate(45deg);
    position: absolute;
}
.minusRotate {
    transform: rotate(-45deg);
}

    </style>
</head>
<body>

    <div class="menubar">
        <span id="one"></span>
        <span id="two"></span>
        <span id="three"></span>
    </div>

    <div class="menu">
        <span>home</span>
        <span>about</span>
        <span>contact</span>
        <span>services</span>
        <span>blog</span>
        <span>portfolio</span>
    </div>

    <script>
        const one = document.querySelector('#one');
        const two = document.querySelector('#two');
        const three = document.querySelector('#three');
        const menu = document.querySelector('.menu');
        const menubar = document.querySelector('.menubar');

        menubar.addEventListener('click', function(){
            menu.classList.toggle('leftMenu');
            two.classList.toggle('deactive');
            three.classList.toggle('minusRotate');
            one.classList.toggle('plusRotate');
        });
    </script>
    
</body>
</html>
