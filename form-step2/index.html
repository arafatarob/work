<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
</head>
<body>

    <form action="">
        <div class="fst-step">
            <select name="option" id="showHide">
                <option value="">select</option>
                <option value="show">show</option>
                <option value="hide">hide</option>
            </select>
            
                <div class="select" style="display: none;">select option</div>

            <button id="next" type="button" onclick="nextStep()">next</button>
        </div>
        <div class="snd-step" style="display: none;">
            <div class="input" style="gap: 10px; display: flex;flex-direction: column; justify-content: center;align-items: start;">
                <input type="text" id="name">
                <div class="name" style="display: none;">enter your name</div>
                select show
            </div>

            <br>
            
                <input type="number" id="number">
                <div class="number" style="display: none;">enter your number</div>
                <br><br>
                <input type="email" id="email">
                <div class="email" style="display: none;">enter your email</div>

                <br><br>


            <button type="button" onclick="prevStep()" id="prev">prev</button>
            <button type="button" id="submit" onclick="prevStep()">next</button>
        </div>
    </form>


    <script>
        
        function nextStep(){
            const firstStep = document.querySelector('.fst-step');
            const secondStep = document.querySelector('.snd-step');
            const input = document.querySelector('.input');
            const name = document.getElementById('name');
            const number = document.getElementById('number');
            const email = document.getElementById('email');
            const selectOption = document.getElementById('showHide').value;
            const nextStep = document.getElementById('next');
        

            if(selectOption === 'show'){
                input.style.display = 'block';
            }else{
                input.style.display = 'none';
            }

            if(selectOption === ""){
                document.querySelector('.select').style.display = 'block';
                return;
            }else{
                
                document.querySelector('.select').style.display = 'none';
            }
            if(name === ""){
                document.querySelector('.name').style.display = 'block';
                return;
            }else{
                
                document.querySelector('.name').style.display = 'none';
            }


            firstStep.style.display = 'none';
            secondStep.style.display = 'block';
        }

        function prevStep(){
            const firstStep = document.querySelector('.fst-step');
            const secondStep = document.querySelector('.snd-step');
            const input = document.querySelector('.input');
            const selectOption = document.getElementById('showHide').value;
            const nextStep = document.getElementById('next');


            firstStep.style.display = 'block';
            secondStep.style.display = 'none';
        }


    </script>
    
</body>
</html>
