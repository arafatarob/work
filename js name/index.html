<html>
    <head>
        <title>My Web Page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            #name{
                padding: 10px 20px;
    border: none;
    outline: none;
    border-radius: 8px;
    background-color: #000;
    color: #fff;
    /* ৩ডি ইফেক্ট: নিচে একটি গাঢ় শ্যাডো এবং হালকা ড্রপ শ্যাডো */
    box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.8), 
                inset -2px -2px 8px rgba(255, 255, 255, 0.1);
    transition: all 0.2s ease;
            }
            .box{
                width: 400px;
                height: 350px;
                margin: 0 auto;
                background-color: #000;
                box-shadow: 10px 10px 10px #000, -10px -10px 10px #000  ;
                border-radius: 10px;
            }
        </style>
    </head>
    <body>

        <input type="text" name="name" placeholder="Enter your name" id="name">

        <input type="button" value="send" id="click">


        <div class="box">
            <h1 id="output">Hello, <span id="nameHere">Jhon</span></h1>
        </div>

        <script>

            const click = document.getElementById('click');
            const nameEl = document.getElementById('name');
            const nameHere = document.getElementById('nameHere');

            click.addEventListener('click', ()=>{

                const name = nameEl.value;
                nameHere.innerHTML = ` ${name}, Welcome to my web page!`;

            });

        </script>

    </body>
</html>
