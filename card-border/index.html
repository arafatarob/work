<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card</title>
    <style>
        body{
            display: flex;
            justify-content: center;    
            align-items: center;
        }
        .card{
            width: 300px;
            height: 400px;
            background-color: #111;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }
        .card::before{
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            border-radius: 20px;
            background-image: conic-gradient(
                transparent, transparent, transparent, #e91e63
            );
            animation: rotate 3s linear infinite;
        }
        .card::after {
    content: "";
    position: absolute;
    background-color: #111;
    inset: 4px;
    border-radius: 20px;
}
        @keyframes rotate {
            0%{
                transform: rotate(0deg);
            }
            100%{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="card"></div>
</body>
</html>
