<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>step bar</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="step-container">
        <h2>Mulit part step bar</h2>
        <div class="steps">
            <div id="bar"></div>
            <div class="step-bar active">1</div>
            <div class="step-bar">2</div>
            <div class="step-bar">3</div>
            <div class="step-bar">4</div>
        </div>
        <div class="box">
            <button class="prev disable" id="prev">prev</button>
            <button class="next" id="next">next</button>
        </div>
    </div>
    

    <script src="./js/custom.js"></script>
</body>
</html>
